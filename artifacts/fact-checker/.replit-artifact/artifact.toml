kind = "web"
previewPath = "/"
title = "Vernacular News Fact-Checker"
version = "1.0.0"
id = "artifacts/fact-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25521

[services.development]
run = "pnpm --filter @workspace/fact-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fact-checker", "run", "build" ]
publicDir = "artifacts/fact-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25521"
BASE_PATH = "/"
